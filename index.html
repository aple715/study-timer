<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深呼吸！讀書專注計時器 (水族箱累積版)</title>
    
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/SRMvMWMP/665.jpg">
    <link rel="apple-touch-icon" href="https://i.postimg.cc/SRMvMWMP/665.jpg">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #f0f3f5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 👑 右上方累積總時數顯示 */
        .stats-display {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(5px);
            -webkit-backdrop-filter: blur(5px);
            padding: 10px 18px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            border: 1px solid rgba(255,255,255,0.2);
            font-variant-numeric: tabular-nums;
        }

        /* 水位背景 */
        .water-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%; 
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            opacity: 0.8;
            transition: height 1s linear;
            z-index: 1;
            overflow: hidden; /* 確保小魚只在水裡游，超出水面會被隱藏 */
        }

        /* 水波紋效果 */
        .water-bg::before {
            content: "";
            position: absolute;
            top: -20px;
            left: 0;
            width: 200%;
            height: 40px;
            background: radial-gradient(circle at 50% -10px, transparent 20px, #4facfe 21px);
            background-size: 40px 40px;
            animation: wave 2s infinite linear;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-40px); }
        }

        /* 🐟 游泳的小魚基礎設定 */
        .fish {
            position: absolute;
            width: 30px;
            height: 16px;
            border-radius: 50%;
            opacity: 0.85;
        }
        /* 魚尾巴 */
        .fish::before {
            content: '';
            position: absolute;
            left: -7px;
            top: 2px;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
        }
        /* 魚眼睛 */
        .fish::after {
            content: '';
            position: absolute;
            right: 6px;
            top: 4px;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
        }

        /* 小魚游動動畫：從左到右 */
        @keyframes swim-right {
            0% { left: -50px; transform: translateY(0); }
            50% { transform: translateY(-12px); }
            100% { left: 105%; transform: translateY(0); }
        }
        /* 小魚游動動畫：從右到左 (需要水平翻轉 scaleX) */
        @keyframes swim-left {
            0% { right: -50px; transform: scaleX(-1) translateY(0); }
            50% { transform: scaleX(-1) translateY(12px); }
            100% { right: 105%; transform: scaleX(-1) translateY(0); }
        }

        /* 设计不同高度、速度、颜色的小鱼 */
        .fish1 { bottom: 15%; background: #ff7675; animation: swim-right 14s linear infinite; }
        .fish1::before { border-right: 9px solid #ff7675; }

        .fish2 { bottom: 45%; background: #ffa502; animation: swim-left 18s linear infinite; animation-delay: 2s; }
        .fish2::before { border-right: 9px solid #ffa502; }

        .fish3 { bottom: 70%; background: #ff4757; animation: swim-right 22s linear infinite; animation-delay: 5s; }
        .fish3::before { border-right: 9px solid #ff4757; }

        .fish4 { bottom: 30%; background: #eccc68; animation: swim-left 13s linear infinite; animation-delay: 7s; }
        .fish4::before { border-right: 9px solid #eccc68; }

        .fish5 { bottom: 85%; background: #10ac84; animation: swim-right 16s linear infinite; animation-delay: 3s; }
        .fish5::before { border-right: 9px solid #10ac84; }


        /* 主介面卡片（毛玻璃效果） */
        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            width: 95%;
            max-width: 420px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
            letter-spacing: 1px;
        }

        /* 時間顯示 */
        .timer-display {
            font-size: 56px;
            font-weight: bold;
            color: #1a3a5f;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        /* 設定區域 */
        .setting-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .setting-group label {
            display: block;
            margin-bottom: 8px;
            color: #556;
            font-size: 13px;
            font-weight: bold;
        }

        .time-inputs-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 5px;
        }

        .time-field {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
        }

        input[type="number"], select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            background-color: white;
            text-align: center;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus, select:focus {
            border-color: #4facfe;
        }

        .time-field span {
            font-size: 14px;
            color: #556;
            white-space: nowrap;
        }

        /* 按鈕風格 */
        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start { background-color: #2ecc71; color: white; }
        .btn-start:hover { background-color: #27ae60; }

        .btn-pause { background-color: #f1c40f; color: #333; }
        .btn-pause:hover { background-color: #f39c12; }

        .btn-reset { background-color: #e74c3c; color: white; }
        .btn-reset:hover { background-color: #c0392b; }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            color: #7f8c8d;
        }

        /* 自訂美化彈出視窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 350px;
            width: 90%;
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-box h2 { color: #e74c3c; margin-bottom: 10px; font-size: 22px; }
        .modal-box p { color: #555; margin-bottom: 20px; font-size: 16px; }
        .modal-btn {
            background-color: #e74c3c; color: white; padding: 12px 30px; font-size: 16px;
            border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
        }
        .modal-btn:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <div class="stats-display" id="accumulated-display">⏱️ 累積專注：00:00:00</div>

    <div class="water-bg" id="water">
        <div class="fish fish1"></div>
        <div class="fish fish2"></div>
        <div class="fish fish3"></div>
        <div class="fish fish4"></div>
        <div class="fish fish5"></div>
    </div>

    <div class="container">
        <h1>書海無涯，水快淹來啦！</h1>
        
        <div class="setting-group">
            <label>設定專注時間</label>
            <div class="time-inputs-container">
                <div class="time-field">
                    <input type="number" id="hours-input" min="0" max="23" value="1">
                    <span>時</span>
                </div>
                <div class="time-field">
                    <input type="number" id="minutes-input" min="0" max="59" value="0">
                    <span>分</span>
                </div>
                <div class="time-field">
                    <input type="number" id="seconds-input" min="0" max="59" value="0">
                    <span>秒</span>
                </div>
            </div>
        </div>

        <div class="setting-group">
            <label for="sound-select">結束鈴聲</label>
            <select id="sound-select">
                <option value="classic">1. 經典嗶嗶聲 (傳統鬧鐘)</option>
                <option value="urgent">2. 快奏警報音 (極度催促)</option>
                <option value="chime">3. 風弦和弦音 (舒服和緩)</option>
                <option value="scifi">4. 科技感光波 (科幻動感)</option>
                <option value="zen">5. 冥想深沉磬 (日式禪風)</option>
                <option value="retro">6. 復古電玩音 (紅白機感)</option>
                <option value="morse">7. 摩斯密碼音 (SOS求救)</option>
                <option value="sonar">8. 潛艇聲納探 (深海孤寂)</option>
                <option value="digital">9. 電子手錶音 (高頻雙響)</option>
            </select>
        </div>

        <div class="timer-display" id="time-left">01:00:00</div>

        <div class="btn-group">
            <button class="btn-start" id="start-btn" onclick="startTimer()">開始</button>
            <button class="btn-pause" id="pause-btn" onclick="pauseTimer()" disabled>暫停</button>
            <button class="btn-reset" id="reset-btn" onclick="resetTimer()">重製</button>
        </div>
    </div>

    <div class="modal-overlay" id="alarm-modal">
        <div class="modal-box">
            <h2>🚨 時間到囉！</h2>
            <p>辛苦了！水已經淹滿了，快起來動一動、喝口水休息吧！</p>
            <button class="modal-btn" onclick="dismissAlarm()">確定 (關閉鬧鐘)</button>
        </div>
    </div>

    <script>
        let totalSeconds = 0;
        let remainingSeconds = 0;
        
        let accumulatedSeconds = parseInt(localStorage.getItem('accumulatedSeconds')) || 0; 
        
        let timerInterval = null;
        let alarmLoopInterval = null; 
        let isPaused = true;

        const hoursInput = document.getElementById('hours-input');
        const minutesInput = document.getElementById('minutes-input');
        const secondsInput = document.getElementById('seconds-input');
        const soundSelect = document.getElementById('sound-select');
        const timeLeftDisplay = document.getElementById('time-left');
        const accumulatedDisplay = document.getElementById('accumulated-display');
        const waterBg = document.getElementById('water');
        const alarmModal = document.getElementById('alarm-modal');
        
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');

        function formatTime(totalSecs) {
            const hrs = Math.floor(totalSecs / 3600);
            const mins = Math.floor((totalSecs % 3600) / 60);
            const secs = totalSecs % 60;
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        function updateUI() {
            timeLeftDisplay.innerText = formatTime(remainingSeconds);
            accumulatedDisplay.innerText = `⏱️ 累積專注：${formatTime(accumulatedSeconds)}`;

            if (totalSeconds > 0) {
                const elapsedSeconds = totalSeconds - remainingSeconds;
                const waterPercentage = (elapsedSeconds / totalSeconds) * 100;
                waterBg.style.height = `${waterPercentage}%`;
            } else {
                waterBg.style.height = '0%';
            }
        }

        function syncPreview() {
            if (isPaused && timerInterval === null) {
                const hrs = parseInt(hoursInput.value) || 0;
                const mins = parseInt(minutesInput.value) || 0;
                const secs = parseInt(secondsInput.value) || 0;
                const previewSeconds = (hrs * 3600) + (mins * 60) + secs;
                timeLeftDisplay.innerText = formatTime(previewSeconds);
            }
        }

        function startTimer() {
            if (isPaused) {
                if (timerInterval === null && remainingSeconds === 0) {
                    const hrs = parseInt(hoursInput.value) || 0;
                    const mins = parseInt(minutesInput.value) || 0;
                    const secs = parseInt(secondsInput.value) || 0;
                    
                    totalSeconds = (hrs * 3600) + (mins * 60) + secs;
                    remainingSeconds = totalSeconds;

                    if (totalSeconds <= 0) {
                        alert('請設定大於 0 秒的時間喔！');
                        return;
                    }
                }

                isPaused = false;
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                
                hoursInput.disabled = true;
                minutesInput.disabled = true;
                secondsInput.disabled = true;

                timerInterval = setInterval(() => {
                    if (remainingSeconds > 0) {
                        remainingSeconds--;
                        accumulatedSeconds++;
                        
                        localStorage.setItem('accumulatedSeconds', accumulatedSeconds); 
                        
                        updateUI();
                    } else {
                        clearInterval(timerInterval);
                        triggerAlarm(); 
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            isPaused = true;
            clearInterval(timerInterval);
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            startBtn.innerText = '繼續';
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            isPaused = true;
            totalSeconds = 0;
            remainingSeconds = 0;
            
            hoursInput.disabled = false;
            minutesInput.disabled = false;
            secondsInput.disabled = false;
            
            startBtn.disabled = false;
            startBtn.innerText = '開始';
            pauseBtn.disabled = true;
            waterBg.style.height = '0%';
            
            syncPreview();
        }

        function triggerAlarm() {
            alarmModal.classList.add('active'); 
            const selectedSound = soundSelect.value;
            
            let loopDelay = 1200; 
            if (selectedSound === 'urgent' || selectedSound === 'digital') loopDelay = 700;
            if (selectedSound === 'chime' || selectedSound === 'zen' || selectedSound === 'morse') loopDelay = 2500;
            if (selectedSound === 'sonar') loopDelay = 2000;

            playAlarmSound(selectedSound);
            alarmLoopInterval = setInterval(() => {
                playAlarmSound(selectedSound);
            }, loopDelay);
        }

        function dismissAlarm() {
            if (alarmLoopInterval) {
                clearInterval(alarmLoopInterval); 
                alarmLoopInterval = null;
            }
            alarmModal.classList.remove('active'); 
            resetTimer(); 
        }

        function playAlarmSound(soundType) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const now = ctx.currentTime;

                const beep = (freq, startTime, duration, type='sine', startGain=0.2) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, startTime);
                    gain.gain.setValueAtTime(startGain, startTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(startTime); osc.stop(startTime + duration);
                };

                switch (soundType) {
                    case 'classic':
                        beep(880, now, 0.15); beep(880, now + 0.2, 0.15);
                        break;
                    case 'urgent':
                        for (let i = 0; i < 4; i++) beep(1200, now + i * 0.12, 0.06, 'square', 0.15);
                        break;
                    case 'chime':
                        [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => beep(f, now + i * 0.08, 1.5, 'sine', 0.15));
                        break;
                    case 'scifi':
                        for (let i = 0; i < 3; i++) {
                            const t = now + i * 0.3;
                            const osc = ctx.createOscillator(); const gain = ctx.createGain();
                            osc.type = 'triangle'; osc.frequency.setValueAtTime(400, t);
                            osc.frequency.exponentialRampToValueAtTime(1500, t + 0.2);
                            gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                            osc.connect(gain); gain.connect(ctx.destination); osc.start(t); osc.stop(t + 0.2);
                        }
                        break;
                    case 'zen':
                        beep(160, now, 2.2, 'sine', 0.3); beep(320, now, 1.8, 'sine', 0.1);
                        break;
                    case 'retro':
                        beep(300, now, 0.05, 'square'); beep(450, now + 0.05, 0.05, 'square');
                        break;
                    case 'morse':
                        const p = (t, d) => beep(900, now + t, d, 'sine', 0.2);
                        p(0, 0.06); p(0.12, 0.06); p(0.24, 0.06); p(0.42, 0.18); p(0.66, 0.18); p(0.90, 0.18); p(1.14, 0.06); p(1.26, 0.06); p(1.38, 0.06);
                        break;
                    case 'sonar':
                        const sOsc = ctx.createOscillator(); const sGain = ctx.createGain();
                        sOsc.type = 'sine'; sOsc.frequency.setValueAtTime(1400, now); sOsc.frequency.exponentialRampToValueAtTime(700, now + 0.6);
                        sGain.gain.setValueAtTime(0.2, now); sGain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                        sOsc.connect(sGain); sGain.connect(ctx.destination); sOsc.start(now); sOsc.stop(now + 1.2);
                        break;
                    case 'digital':
                        beep(2800, now, 0.05, 'sine', 0.2); beep(2800, now + 0.08, 0.05, 'sine', 0.2);
                        break;
                }
            } catch (error) {
                console.error("播放音效失敗：", error);
            }
        }

        hoursInput.addEventListener('input', syncPreview);
        minutesInput.addEventListener('input', syncPreview);
        secondsInput.addEventListener('input', syncPreview);

        accumulatedDisplay.innerText = `⏱️ 累積專注：${formatTime(accumulatedSeconds)}`;
    </script>
</body>
</html>
