<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深呼吸！讀書專注計時器 (水族箱進化版)</title>
    
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐟</text></svg>">
    <link class="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🐟</text></svg>">

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body, html {
            height: 100%;
            overflow: hidden;
            background-color: #f0f3f5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 👑 右上方累積總時數與圖鑑顯示區域 */
        .stats-display {
            position: absolute;
            top: 20px;
            right: 20px;
            z-index: 20;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            padding: 15px 20px;
            border-radius: 14px;
            font-size: 15px;
            font-weight: bold;
            color: #2c3e50;
            box-shadow: 0 6px 20px rgba(0,0,0,0.1);
            border: 1px solid rgba(255,255,255,0.25);
            font-variant-numeric: tabular-nums;
            text-align: right;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .unlocked-count {
            font-size: 12px;
            color: #7f8c8d;
            margin-top: 2px;
        }

        /* 📘 圖鑑下拉選單大改造：寬度、字體皆放大 */
        .fish-guide-select {
            margin-top: 8px;
            padding: 8px 12px;
            font-size: 14px; /* 放大字體 */
            font-weight: 600;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            background-color: #ffffff;
            color: #2c3e50;
            cursor: pointer;
            outline: none;
            width: 260px; /* 大幅加寬選單，防止文字擠在一起 */
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .fish-guide-select:focus {
            border-color: #4facfe;
            box-shadow: 0 0 8px rgba(79, 172, 254, 0.3);
        }

        /* 水位背景 */
        .water-bg {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 0%; 
            background: linear-gradient(180deg, #4facfe 0%, #00f2fe 100%);
            opacity: 0.8;
            transition: height 1s linear;
            z-index: 1;
            overflow: hidden;
        }

        /* 水波紋效果 */
        .water-bg::before {
            content: "";
            position: absolute;
            top: -20px;
            left: 0;
            width: 200%;
            height: 40px;
            background: radial-gradient(circle at 50% -10px, transparent 20px, #4facfe 21px);
            background-size: 40px 40px;
            animation: wave 2s infinite linear;
        }

        @keyframes wave {
            0% { transform: translateX(0); }
            100% { transform: translateX(-40px); }
        }

        /* 🐟 游泳小魚容器設定 */
        .fish-container {
            position: absolute;
            width: 50px;
            height: 35px;
            opacity: 0.9;
        }

        @keyframes swim-right {
            0% { left: -70px; transform: translateY(0); }
            50% { transform: translateY(-15px); }
            100% { left: 105%; transform: translateY(0); }
        }
        @keyframes swim-left {
            0% { right: -70px; transform: scaleX(-1) translateY(0); }
            50% { transform: scaleX(-1) translateY(15px); }
            100% { right: 105%; transform: scaleX(-1) translateY(0); }
        }

        /* 主介面卡片 */
        .container {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.18);
            text-align: center;
            width: 95%;
            max-width: 420px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 25px;
            font-size: 24px;
            letter-spacing: 1px;
        }

        .timer-display {
            font-size: 56px;
            font-weight: bold;
            color: #1a3a5f;
            margin: 20px 0;
            font-variant-numeric: tabular-nums;
        }

        .setting-group {
            text-align: left;
            margin-bottom: 15px;
        }

        .setting-group label {
            display: block;
            margin-bottom: 8px;
            color: #556;
            font-size: 13px;
            font-weight: bold;
        }

        .time-inputs-container {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 5px;
        }

        .time-field {
            display: flex;
            align-items: center;
            gap: 5px;
            flex: 1;
        }

        input[type="number"], select {
            width: 100%;
            padding: 10px;
            font-size: 16px;
            border: 2px solid #cbd5e1;
            border-radius: 8px;
            outline: none;
            background-color: white;
            text-align: center;
            transition: border-color 0.2s;
        }

        input[type="number"]:focus, select:focus {
            border-color: #4facfe;
        }

        .time-field span {
            font-size: 14px;
            color: #556;
            white-space: nowrap;
        }

        .btn-group {
            display: flex;
            justify-content: space-between;
            gap: 10px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            padding: 12px 20px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-start { background-color: #2ecc71; color: white; }
        .btn-start:hover { background-color: #27ae60; }

        .btn-pause { background-color: #f1c40f; color: #333; }
        .btn-pause:hover { background-color: #f39c12; }

        .btn-reset { background-color: #e74c3c; color: white; }
        .btn-reset:hover { background-color: #c0392b; }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            color: #7f8c8d;
        }

        /* 彈出視窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.6);
            backdrop-filter: blur(5px);
            z-index: 100;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-box {
            background: white;
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            max-width: 350px;
            width: 90%;
            animation: popUp 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes popUp {
            from { transform: scale(0.8); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .modal-box h2 { color: #e74c3c; margin-bottom: 10px; font-size: 22px; }
        .modal-box p { color: #555; margin-bottom: 20px; font-size: 16px; }
        .modal-btn {
            background-color: #e74c3c; color: white; padding: 12px 30px; font-size: 16px;
            border: none; border-radius: 8px; cursor: pointer; width: 100%; font-weight: bold;
            box-shadow: 0 4px 10px rgba(231, 76, 60, 0.3);
        }
        .modal-btn:hover { background-color: #c0392b; }
    </style>
</head>
<body>

    <div class="stats-display">
        <div id="accumulated-display">⏱️ 累積專注：00:00:00</div>
        <div class="unlocked-count" id="fish-count-display">🐠 已解鎖魚種：1 / 5</div>
        <select id="fish-guide" class="fish-guide-select">
            <option value="" disabled selected>📜 查看魚種解鎖門檻</option>
        </select>
    </div>

    <div class="water-bg" id="water"></div>

    <div class="container">
        <h1>書海無涯，水快淹來啦！</h1>
        
        <div class="setting-group">
            <label>設定專注時間</label>
            <div class="time-inputs-container">
                <div class="time-field">
                    <input type="number" id="hours-input" min="0" max="23" value="1">
                    <span>時</span>
                </div>
                <div class="time-field">
                    <input type="number" id="minutes-input" min="0" max="59" value="0">
                    <span>分</span>
                </div>
                <div class="time-field">
                    <input type="number" id="seconds-input" min="0" max="59" value="0">
                    <span>秒</span>
                </div>
            </div>
        </div>

        <div class="setting-group">
            <label for="sound-select">結束鈴聲</label>
            <select id="sound-select">
                <option value="classic">1. 經典嗶嗶聲 (傳統鬧鐘)</option>
                <option value="urgent">2. 快奏警報音 (極度催促)</option>
                <option value="chime">3. 風弦和弦音 (舒服和緩)</option>
                <option value="scifi">4. 科技感光波 (科幻動感)</option>
                <option value="zen">5. 冥想深沉磬 (日式禪風)</option>
                <option value="retro">6. 復古電玩音 (紅白機感)</option>
                <option value="morse">7. 摩斯密碼音 (SOS求救)</option>
                <option value="sonar">8. 潛艇聲納探 (深海孤寂)</option>
                <option value="digital">9. 電子手錶音 (高頻雙響)</option>
            </select>
        </div>

        <div class="timer-display" id="time-left">01:00:00</div>

        <div class="btn-group">
            <button class="btn-start" id="start-btn" onclick="startTimer()">開始</button>
            <button class="btn-pause" id="pause-btn" onclick="pauseTimer()" disabled>暫停</button>
            <button class="btn-reset" id="reset-btn" onclick="resetTimer()">重置</button>
        </div>
    </div>

    <div class="modal-overlay" id="alarm-modal">
        <div class="modal-box">
            <h2>🚨 時間到囉！</h2>
            <p>辛苦了！水已經淹滿了，快起來動一動、喝口水休息吧！</p>
            <button class="modal-btn" onclick="dismissAlarm()">確定 (關閉鬧鐘)</button>
        </div>
    </div>

    <script>
        // 🐟 魚種解鎖資料庫 (加上 icon 文字圖示，方便選單渲染)
        const FISH_DATABASE = [
            { 
                id: 'fish1', name: '基本金魚', icon: '🐟', target: 0, speed: '14s', dir: 'swim-right', bottom: '15%', label: '初始擁有',
                svg: `<svg viewBox="0 0 50 30"><path d="M10,15 Q25,3 40,15 Q25,27 10,15 Z" fill="#ff7675"/><path d="M10,15 L2,8 L5,15 L2,22 Z" fill="#ff7675"/><circle cx="33" cy="12" r="2" fill="#fff"/><circle cx="33" cy="12" r="1" fill="#000"/></svg>`
            },
            { 
                id: 'fish2', name: '活力小丑魚', icon: '🐠', target: 300, speed: '18s', dir: 'swim-left', bottom: '45%', label: '累積 5 分鐘',
                svg: `<svg viewBox="0 0 50 30"><path d="M10,15 Q25,3 40,15 Q25,27 10,15 Z" fill="#ffa502"/><path d="M10,15 L2,8 L5,15 L2,22 Z" fill="#ffa502"/><path d="M20,6 Q23,15 20,24 L24,23 Q27,15 24,7 Z" fill="#fff"/><path d="M29,7 Q31,15 29,23 L32,22 Q34,15 32,8 Z" fill="#fff"/><circle cx="33" cy="12" r="1.5" fill="#000"/></svg>`
            },
            { 
                id: 'fish3', name: '黃金藍倒吊', icon: '🐟', target: 900, speed: '15s', dir: 'swim-right', bottom: '65%', label: '累積 15 分鐘',
                svg: `<svg viewBox="0 0 50 30"><path d="M10,15 Q25,3 40,15 Q25,27 10,15 Z" fill="#2e86de"/><path d="M10,15 L2,8 L5,15 L2,22 Z" fill="#f1c40f"/><path d="M15,10 Q25,7 32,15 Q22,17 15,10 Z" fill="#1a3a5f"/><circle cx="34" cy="12" r="1.5" fill="#000"/></svg>`
            },
            { 
                id: 'fish4', name: '閃亮亮燈魚', icon: '🐡', target: 1800, speed: '12s', dir: 'swim-left', bottom: '30%', label: '累積 30 分鐘',
                svg: `<svg viewBox="0 0 50 30"><path d="M10,15 Q25,5 40,15 Q25,25 10,15 Z" fill="#74b9ff"/><path d="M10,15 L3,9 L5,15 L3,21 Z" fill="#ff7675"/><path d="M12,15 Q25,12 38,15" stroke="#00f2fe" stroke-width="2" fill="none"/><circle cx="33" cy="13" r="1" fill="#000"/></svg>`
            },
            { 
                id: 'fish5', name: '霸氣獅子魚', icon: '🦁', target: 3600, speed: '21s', dir: 'swim-right', bottom: '75%', label: '累積 1 小時',
                svg: `<svg viewBox="0 0 50 30"><path d="M10,15 Q25,3 40,15 Q25,27 10,15 Z" fill="#d2143a"/><path d="M10,15 L1,5 L5,15 L1,25 Z" fill="#d2143a"/><path d="M18,3 L15,12 M23,2 L21,11 M28,2 L27,11 M33,3 L31,12" stroke="#fff" stroke-width="1.5"/><path d="M18,27 L16,18 M23,28 L21,19 M27,28 L25,19" stroke="#fff" stroke-width="1.5"/><path d="M15,8 Q25,5 35,12" stroke="#fff" stroke-width="2" fill="none"/><path d="M15,22 Q25,25 35,18" stroke="#fff" stroke-width="2" fill="none"/><circle cx="33" cy="12" r="1.5" fill="#fff"/></svg>`
            }
        ];

        let totalSeconds = 0;
        let remainingSeconds = 0;
        let accumulatedSeconds = parseInt(localStorage.getItem('accumulatedSeconds')) || 0; 
        let currentUnlockedCount = -1; 
        
        let timerInterval = null;
        let alarmLoopInterval = null; 
        let isPaused = true;

        const defaultTitle = "深呼吸！讀書專注計時器 (水族箱進化版)";
        const hoursInput = document.getElementById('hours-input');
        const minutesInput = document.getElementById('minutes-input');
        const secondsInput = document.getElementById('seconds-input');
        const soundSelect = document.getElementById('sound-select');
        const timeLeftDisplay = document.getElementById('time-left');
        const accumulatedDisplay = document.getElementById('accumulated-display');
        const fishCountDisplay = document.getElementById('fish-count-display');
        const fishGuideSelect = document.getElementById('fish-guide');
        const waterBg = document.getElementById('water');
        const alarmModal = document.getElementById('alarm-modal');
        
        const startBtn = document.getElementById('start-btn');
        const pauseBtn = document.getElementById('pause-btn');

        function formatTime(totalSecs) {
            const hrs = Math.floor(totalSecs / 3600);
            const mins = Math.floor((totalSecs % 3600) / 60);
            const secs = totalSecs % 60;
            return `${hrs.toString().padStart(2, '0')}:${mins.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
        }

        // 🌟 核心修改：將鎖頭 🔒 替換為該條魚專屬的文字圖案，未解鎖時加上提示
        function updateFishGuideUI() {
            fishGuideSelect.innerHTML = '<option value="" disabled selected>📜 查看魚種解鎖門檻</option>';
            
            FISH_DATABASE.forEach(fish => {
                const option = document.createElement('option');
                const isUnlocked = accumulatedSeconds >= fish.target;
                
                // 💡 邏輯：已解鎖顯示專屬魚圖示，未解鎖則顯示大鎖頭
                if (isUnlocked) {
                    option.text = `${fish.icon} ${fish.name} (${fish.label})`;
                } else {
                    option.text = `🔒 ??? (${fish.label}解鎖)`;
                }
                
                option.value = fish.id;
                fishGuideSelect.appendChild(option);
            });
        }

        // 🌟 檢查並動態刷新魚群
        function checkAndRefreshFishTank() {
            let unlockedCount = 0;
            FISH_DATABASE.forEach(fish => {
                if (accumulatedSeconds >= fish.target) unlockedCount++;
            });

            if (unlockedCount !== currentUnlockedCount) {
                currentUnlockedCount = unlockedCount;
                waterBg.innerHTML = ''; 

                FISH_DATABASE.forEach((fish) => {
                    if (accumulatedSeconds >= fish.target) {
                        const fishContainer = document.createElement('div');
                        fishContainer.className = 'fish-container';
                        fishContainer.style.bottom = fish.bottom;
                        fishContainer.style.animation = `${fish.dir} ${fish.speed} linear infinite`;
                        
                        fishContainer.innerHTML = fish.svg;
                        waterBg.appendChild(fishContainer);
                    }
                });

                fishCountDisplay.innerText = `🐠 已解鎖魚種：${unlockedCount} / ${FISH_DATABASE.length}`;
                
                // 同步更新放大後的圖鑑下拉選單
                updateFishGuideUI();
            }
        }

        function updateUI() {
            const formattedRemaining = formatTime(remainingSeconds);
            timeLeftDisplay.innerText = formattedRemaining;
            accumulatedDisplay.innerText = `⏱️ 累積專注：${formatTime(accumulatedSeconds)}`;

            if (!isPaused && remainingSeconds > 0) {
                document.title = `(${formattedRemaining}) 讀書中...`;
            } else if (isPaused && remainingSeconds > 0) {
                document.title = `[已暫停] ${defaultTitle}`;
            } else {
                document.title = defaultTitle;
            }

            if (totalSeconds > 0) {
                const elapsedSeconds = totalSeconds - remainingSeconds;
                const waterPercentage = (elapsedSeconds / totalSeconds) * 100;
                waterBg.style.height = `${waterPercentage}%`;
            } else {
                waterBg.style.height = '0%';
            }
        }

        function getInputsInSeconds() {
            let hrs = Math.max(0, parseInt(hoursInput.value) || 0);
            let mins = Math.max(0, parseInt(minutesInput.value) || 0);
            let secs = Math.max(0, parseInt(secondsInput.value) || 0);
            return (hrs * 3600) + (mins * 60) + secs;
        }

        function syncPreview() {
            if (isPaused && timerInterval === null) {
                const previewSeconds = getInputsInSeconds();
                timeLeftDisplay.innerText = formatTime(previewSeconds);
            }
        }

        function startTimer() {
            if (isPaused) {
                if (timerInterval === null && remainingSeconds === 0) {
                    totalSeconds = getInputsInSeconds();
                    remainingSeconds = totalSeconds;

                    if (totalSeconds <= 0) {
                        alert('請設定大於 0 秒的時間喔！');
                        return;
                    }
                }

                isPaused = false;
                startBtn.disabled = true;
                pauseBtn.disabled = false;
                
                hoursInput.disabled = true;
                minutesInput.disabled = true;
                secondsInput.disabled = true;

                updateUI();

                timerInterval = setInterval(() => {
                    if (remainingSeconds > 0) {
                        remainingSeconds--;
                        accumulatedSeconds++;
                        
                        localStorage.setItem('accumulatedSeconds', accumulatedSeconds); 
                        
                        checkAndRefreshFishTank();
                        updateUI();
                    } else {
                        clearInterval(timerInterval);
                        timerInterval = null;
                        triggerAlarm(); 
                    }
                }, 1000);
            }
        }

        function pauseTimer() {
            isPaused = true;
            clearInterval(timerInterval);
            timerInterval = null;
            startBtn.disabled = false;
            pauseBtn.disabled = true;
            startBtn.innerText = '繼續';
            
            hoursInput.disabled = true;
            minutesInput.disabled = true;
            secondsInput.disabled = true;
            
            updateUI();
        }

        function resetTimer() {
            clearInterval(timerInterval);
            timerInterval = null;
            isPaused = true;
            totalSeconds = 0;
            remainingSeconds = 0;
            
            hoursInput.disabled = false;
            minutesInput.disabled = false;
            secondsInput.disabled = false;
            
            startBtn.disabled = false;
            startBtn.innerText = '開始';
            pauseBtn.disabled = true;
            waterBg.style.height = '0%';
            
            document.title = defaultTitle;
            syncPreview();
        }

        function triggerAlarm() {
            alarmModal.classList.add('active'); 
            document.title = `🚨 時間到囉！！！`;
            const selectedSound = soundSelect.value;
            
            let loopDelay = 1200; 
            if (selectedSound === 'urgent' || selectedSound === 'digital') loopDelay = 700;
            if (selectedSound === 'chime' || selectedSound === 'zen' || selectedSound === 'morse') loopDelay = 2500;
            if (selectedSound === 'sonar') loopDelay = 2000;

            playAlarmSound(selectedSound);
            alarmLoopInterval = setInterval(() => {
                playAlarmSound(selectedSound);
            }, loopDelay);
        }

        function dismissAlarm() {
            if (alarmLoopInterval) {
                clearInterval(alarmLoopInterval); 
                alarmLoopInterval = null;
            }
            alarmModal.classList.remove('active'); 
            resetTimer(); 
        }

        function playAlarmSound(soundType) {
            try {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                const ctx = new AudioContext();
                const now = ctx.currentTime;

                const beep = (freq, startTime, duration, type='sine', startGain=0.2) => {
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.type = type;
                    osc.frequency.setValueAtTime(freq, startTime);
                    gain.gain.setValueAtTime(startGain, startTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, startTime + duration);
                    osc.connect(gain); gain.connect(ctx.destination);
                    osc.start(startTime); osc.stop(startTime + duration);
                };

                switch (soundType) {
                    case 'classic': beep(880, now, 0.15); beep(880, now + 0.2, 0.15); break;
                    case 'urgent': for (let i = 0; i < 4; i++) beep(1200, now + i * 0.12, 0.06, 'square', 0.15); break;
                    case 'chime': [523.25, 659.25, 783.99, 1046.50].forEach((f, i) => beep(f, now + i * 0.08, 1.5, 'sine', 0.15)); break;
                    case 'scifi':
                        for (let i = 0; i < 3; i++) {
                            const t = now + i * 0.3;
                            const osc = ctx.createOscillator(); const gain = ctx.createGain();
                            osc.type = 'triangle'; osc.frequency.setValueAtTime(400, t);
                            osc.frequency.exponentialRampToValueAtTime(1500, t + 0.2);
                            gain.gain.setValueAtTime(0.2, t); gain.gain.exponentialRampToValueAtTime(0.001, t + 0.2);
                            osc.connect(gain); gain.connect(ctx.destination); osc.start(t); osc.stop(t + 0.2);
                        }
                        break;
                    case 'zen': beep(160, now, 2.2, 'sine', 0.3); beep(320, now, 1.8, 'sine', 0.1); break;
                    case 'retro': beep(300, now, 0.05, 'square'); beep(450, now + 0.05, 0.05, 'square'); break;
                    case 'morse':
                        const p = (t, d) => beep(900, now + t, d, 'sine', 0.2);
                        p(0, 0.06); p(0.12, 0.06); p(0.24, 0.06); p(0.42, 0.18); p(0.66, 0.18); p(0.90, 0.18); p(1.14, 0.06); p(1.26, 0.06); p(1.38, 0.06);
                        break;
                    case 'sonar':
                        const sOsc = ctx.createOscillator(); const sGain = ctx.createGain();
                        sOsc.type = 'sine'; sOsc.frequency.setValueAtTime(1400, now); sOsc.frequency.exponentialRampToValueAtTime(700, now + 0.6);
                        sGain.gain.setValueAtTime(0.2, now); sGain.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
                        sOsc.connect(sGain); sGain.connect(ctx.destination); sOsc.start(now); sOsc.stop(now + 1.2);
                        break;
                    case 'digital': beep(2800, now, 0.05, 'sine', 0.2); beep(2800, now + 0.08, 0.05, 'sine', 0.2); break;
                }
            } catch (error) {
                console.error("播放音效失敗：", error);
            }
        }

        hoursInput.addEventListener('input', syncPreview);
        minutesInput.addEventListener('input', syncPreview);
        secondsInput.addEventListener('input', syncPreview);

        // 初始化執行
        updateFishGuideUI();
        checkAndRefreshFishTank();
    </script>
